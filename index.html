<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Swaraj Atelier — Luxury Indian Fashion. Coming Soon, 15 August 2026." />
  <title>Swaraj Atelier — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Poppins:wght@200;300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background -->
  <div class="bg" aria-hidden="true">
    <div class="bg__drape"></div>
    <div class="bg__botanical-left"></div>
    <div class="bg__botanical-right"></div>
  </div>

  <!-- Page -->
  <div class="page">

    <!-- 1. Logo — using your actual logo.png -->
    <div class="logo-wrap fade-in" style="--d:0s">
      <img
        src="assests/logo.png"
        alt="Swaraj Atelier Logo"
        class="logo-img"
        draggable="false"
      />
    </div>

    <!-- 2. Brand Name -->
    <h1 class="brand fade-in" style="--d:.18s">
      <span>Swaraj</span>
      <span>Atelier</span>
    </h1>

    <!-- 3. Divider + floral motif -->
    <div class="divider fade-in" style="--d:.32s">
      <span class="divider__line"></span>
      <svg class="divider__motif" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
        <circle cx="15" cy="15" r="2.6" fill="#7a5c50"/>
        <circle cx="15" cy="7.5" r="1.3" fill="#7a5c50"/>
        <circle cx="15" cy="22.5" r="1.3" fill="#7a5c50"/>
        <circle cx="7.5" cy="15" r="1.3" fill="#7a5c50"/>
        <circle cx="22.5" cy="15" r="1.3" fill="#7a5c50"/>
        <line x1="15" y1="10"  x2="15" y2="12.4" stroke="#7a5c50" stroke-width="1.1"/>
        <line x1="15" y1="17.6" x2="15" y2="20"  stroke="#7a5c50" stroke-width="1.1"/>
        <line x1="10"  y1="15" x2="12.4" y2="15" stroke="#7a5c50" stroke-width="1.1"/>
        <line x1="17.6" y1="15" x2="20" y2="15"  stroke="#7a5c50" stroke-width="1.1"/>
        <circle cx="11" cy="11" r="0.8" fill="#7a5c50"/>
        <circle cx="19" cy="11" r="0.8" fill="#7a5c50"/>
        <circle cx="11" cy="19" r="0.8" fill="#7a5c50"/>
        <circle cx="19" cy="19" r="0.8" fill="#7a5c50"/>
      </svg>
      <span class="divider__line"></span>
    </div>

    <!-- 4. Coming Soon -->
    <p class="coming-soon fade-in" style="--d:.42s">Coming Soon</p>

    <!-- 5. Save The Date -->
    <p class="save-label fade-in" style="--d:.52s">Save The Date</p>

    <!-- 6. Launch Date -->
    <p class="launch-date fade-in" style="--d:.62s">15&thinsp;&nbsp;August&thinsp;&nbsp;2026</p>

    <!-- 7. Small floral -->
    <div class="divider divider--sm fade-in" style="--d:.70s">
      <svg class="divider__motif divider__motif--sm" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
        <circle cx="15" cy="15" r="2.4" fill="#9e8070"/>
        <circle cx="15" cy="8"  r="1.1" fill="#9e8070"/>
        <circle cx="15" cy="22" r="1.1" fill="#9e8070"/>
        <circle cx="8"  cy="15" r="1.1" fill="#9e8070"/>
        <circle cx="22" cy="15" r="1.1" fill="#9e8070"/>
        <line x1="15" y1="10"  x2="15" y2="12.6" stroke="#9e8070" stroke-width="1"/>
        <line x1="15" y1="17.4" x2="15" y2="20"  stroke="#9e8070" stroke-width="1"/>
        <line x1="10"  y1="15" x2="12.6" y2="15" stroke="#9e8070" stroke-width="1"/>
        <line x1="17.4" y1="15" x2="20" y2="15"  stroke="#9e8070" stroke-width="1"/>
      </svg>
    </div>

    <!-- 8. Countdown -->
    <div class="countdown fade-in" style="--d:.80s" aria-label="Countdown to launch">
      <div class="cd-card" id="card-months">
        <span class="cd-num" id="months">02</span>
        <span class="cd-lbl">Months</span>
      </div>
      <div class="cd-card" id="card-days">
        <span class="cd-num" id="days">25</span>
        <span class="cd-lbl">Days</span>
      </div>
      <div class="cd-card" id="card-hours">
        <span class="cd-num" id="hours">10</span>
        <span class="cd-lbl">Hours</span>
      </div>
      <div class="cd-card" id="card-minutes">
        <span class="cd-num" id="minutes">51</span>
        <span class="cd-lbl">Minutes</span>
      </div>
      <div class="cd-card" id="card-seconds">
        <span class="cd-num" id="seconds">08</span>
        <span class="cd-lbl">Seconds</span>
      </div>
    </div>

    <!-- 9. Tagline -->
    <div class="tagline-wrap fade-in" style="--d:.95s">
      <span class="tagline__line"></span>
      <p class="tagline">Wear Your Freedom</p>
      <span class="tagline__line tagline__line--r"></span>
    </div>

    <!-- 10. Instagram CTA -->
    <a href="https://www.instagram.com/" target="_blank" rel="noopener"
       class="cta-btn fade-in" style="--d:1.1s" aria-label="Follow Swaraj Atelier on Instagram">
      <svg class="cta-btn__ig" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="20" rx="6" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="17.6" cy="6.4" r="1.1" fill="currentColor"/>
      </svg>
      <span>Follow Our Journey</span>
    </a>

  </div><!-- /page -->

  <!-- Footer -->
  <footer class="footer fade-in" style="--d:1.2s">
    <p>&#169; 2026 Swaraj Atelier. All Rights Reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
